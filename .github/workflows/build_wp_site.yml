name: Build WordPress Site

on:
  workflow_dispatch:
    inputs:
      wordpress_url:
        description: 'WordPress site URL'
        required: true
      wordpress_user:
        description: 'WordPress username'
        required: true
      wordpress_app_pass:
        description: 'WordPress Application Password (per-client)'
        required: true
      business_name:
        description: 'Business name'
        required: true
      industry:
        description: 'Industry'
        required: true
      city:
        description: 'City'
        required: true
      country:
        description: 'Country'
        required: false
        default: 'UAE'
      state:
        description: 'State / Region'
        required: false
        default: ''
      phone:
        description: 'Phone'
        required: false
        default: ''
      mode:
        description: 'Mode (1/2/3)'
        required: true
        default: '3'
      language:
        description: 'Language'
        required: false
        default: 'en'
      target_page_id:
        description: 'Mode 1: target page ID'
        required: false
        default: ''
      main_service:
        description: 'Mode 1: main service'
        required: false
        default: ''
      hub_page_id:
        description: 'Mode 2: hub page ID'
        required: false
        default: ''
      sub_services:
        description: 'Mode 2: services (comma separated)'
        required: false
        default: ''
      services_mode3:
        description: 'Mode 3: services (comma separated)'
        required: false
        default: ''
      image_model:
        description: 'Image model (1=hybrid, 2=gpt)'
        required: false
        default: '1'
      backlinks:
        description: 'Dev.to backlinks (yes/no)'
        required: false
        default: 'no'
      internal_links:
        description: 'Internal links (yes/no)'
        required: false
        default: 'yes'
      facebook:
        required: false
        default: '#'
      instagram:
        required: false
        default: '#'
      twitter:
        required: false
        default: '#'
      linkedin:
        required: false
        default: '#'
      youtube:
        required: false
        default: '#'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write config.json
        run: |
          cat > config.json << 'EOF'
          {
            "wordpress_url": "${{ github.event.inputs.wordpress_url }}",
            "wordpress_user": "${{ github.event.inputs.wordpress_user }}",
            "wordpress_app_password": "${{ github.event.inputs.wordpress_app_pass }}",
            "business_name": "${{ github.event.inputs.business_name }}",
            "industry": "${{ github.event.inputs.industry }}",
            "city": "${{ github.event.inputs.city }}",
            "country": "${{ github.event.inputs.country }}",
            "state": "${{ github.event.inputs.state }}",
            "phone": "${{ github.event.inputs.phone }}",
            "mode": "${{ github.event.inputs.mode }}",
            "language": "${{ github.event.inputs.language }}",
            "target_page_id": "${{ github.event.inputs.target_page_id }}",
            "main_service": "${{ github.event.inputs.main_service }}",
            "hub_page_id": "${{ github.event.inputs.hub_page_id }}",
            "sub_services": "${{ github.event.inputs.sub_services }}",
            "services_mode3": "${{ github.event.inputs.services_mode3 }}",
            "image_model": "${{ github.event.inputs.image_model }}",
            "backlinks": "${{ github.event.inputs.backlinks }}",
            "internal_links": "${{ github.event.inputs.internal_links }}",
            "facebook": "${{ github.event.inputs.facebook }}",
            "instagram": "${{ github.event.inputs.instagram }}",
            "twitter": "${{ github.event.inputs.twitter }}",
            "linkedin": "${{ github.event.inputs.linkedin }}",
            "youtube": "${{ github.event.inputs.youtube }}"
          }
          EOF
          echo "config.json written (contents hidden — contains credentials)"

      - name: Run WordPress generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
        run: python main.py

      - name: Upload run log (always, for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wp-build-log-${{ github.run_id }}
          path: |
            *.log
          if-no-files-found: ignore
          retention-days: 14
